<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>MMS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
  body { background: #e7ebf0; height: 100vh; overflow: hidden; }
  button { cursor: pointer; border: none; background: none; font: inherit; }
  input { font: inherit; outline: none; }

  body.dark { background: #0f1419; }
  body.dark .auth-screen { background: #15202b; color: #fff; }
  body.dark .auth-screen input { background: #22303c; border-color: #38444d; color: #fff; }
  body.dark .auth-screen input:focus { border-color: #1d9bf0; }
  body.dark .auth-screen button.primary { background: #1d9bf0; }
  body.dark .app { background: #15202b; }
  body.dark .sidebar { background: #15202b; border-right-color: #38444d; }
  body.dark .sidebar-header { border-bottom-color: #38444d; }
  body.dark .icon-btn { color: #8899a6; }
  body.dark .icon-btn:hover { background: #1e2732; }
  body.dark .chat-item:hover { background: #1e2732; }
  body.dark .chat-item.active { background: #1d9bf0; color: #fff; }
  body.dark .chat-item.active .chat-preview,
  body.dark .chat-item.active .chat-time { color: rgba(255,255,255,.85); }
  body.dark .avatar { background: #1d9bf0; color: #fff; }
  body.dark .chat-name { color: #fff; }
  body.dark .chat-time { color: #8899a6; }
  body.dark .chat-preview { color: #8899a6; }
  body.dark .chat-area { background: #0f1419; }
  body.dark .chat-header { background: #15202b; border-bottom-color: #38444d; }
  body.dark .chat-header .name { color: #fff; }
  body.dark .chat-header .status { color: #8899a6; }
  body.dark .message { background: #22303c; color: #fff; }
  body.dark .message.own { background: #1d9bf0; color: #fff; }
  body.dark .message .time { color: #8899a6; }
  body.dark .input-area { background: #15202b; }
  body.dark .input-area input { background: #22303c; border-color: #38444d; color: #fff; }
  body.dark .input-area input:focus { background: #2a3441; border-color: #1d9bf0; }
  body.dark .send-btn { background: #1d9bf0; color: #fff; }
  body.dark .modal { background: #15202b; color: #fff; }
  body.dark .modal input { background: #22303c; border-color: #38444d; color: #fff; }
  body.dark .modal .btn-primary { background: #1d9bf0; color: #fff; }
  body.dark .modal .btn-secondary { background: #22303c; color: #fff; }
  body.dark .modal .btn-secondary:hover { background: #2a3441; }
  body.dark .empty-chat { color: #8899a6; }
  body.dark .search-friends { border-bottom-color: #38444d; }
  body.dark .search-friends input { background: #22303c; border-color: #38444d; color: #fff; }

  .auth-screen {
    background: #fff; width: 360px; padding: 32px; border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,.08);
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  }
  .auth-screen h1 { font-size: 22px; margin-bottom: 20px; color: #2AABEE; text-align: center; }
  .auth-screen input {
    width: 100%; padding: 12px; margin-bottom: 12px;
    border: 1px solid #ddd; border-radius: 8px;
  }
  .auth-screen input:focus { border-color: #2AABEE; }
  .auth-screen button.primary {
    width: 100%; padding: 12px; background: #2AABEE; color: #fff;
    border-radius: 8px; font-weight: 500; transition: .2s;
  }
  .auth-screen button.primary:hover { background: #229ED9; }
  .auth-screen .switch { text-align: center; margin-top: 14px; color: #666; font-size: 14px; }
  .auth-screen .switch a { color: #2AABEE; cursor: pointer; }
  .auth-error { color: #e53935; font-size: 13px; margin-bottom: 10px; min-height: 18px; }

  .app { display: none; width: 100%; height: 100vh; background: #fff; position: relative; }
  .app.active { display: flex; }

  .sidebar {
    width: 340px; border-right: 1px solid #e7ebf0;
    display: flex; flex-direction: column; background: #fff;
    height: 100%; position: relative; z-index: 10;
  }
  .sidebar-header {
    height: 56px; padding: 0 16px; display: flex; align-items: center;
    justify-content: space-between; border-bottom: 1px solid #e7ebf0;
  }
  .icon-btn {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #707579; transition: .2s;
  }
  .icon-btn:hover { background: #f0f2f5; }
  .icon-btn svg { width: 22px; height: 22px; }

  .chat-list { flex: 1; overflow-y: auto; }
  .chat-item {
    display: flex; padding: 10px 14px; gap: 12px; cursor: pointer;
    transition: .15s; align-items: center;
  }
  .chat-item:hover { background: #f4f6f8; }
  .chat-item.active { background: #2AABEE; color: #fff; }
  .chat-item.active .chat-preview,
  .chat-item.active .chat-time { color: rgba(255,255,255,.85); }

  .avatar {
    width: 48px; height: 48px; border-radius: 50%;
    background: #2AABEE; color: #fff; display: flex;
    align-items: center; justify-content: center;
    font-weight: 500; flex-shrink: 0; overflow: hidden;
    background-size: cover; background-position: center;
  }
  .chat-info { flex: 1; min-width: 0; }
  .chat-top { display: flex; justify-content: space-between; }
  .chat-name { font-weight: 500; font-size: 15px; }
  .chat-time { font-size: 12px; color: #707579; }
  .chat-preview {
    font-size: 14px; color: #707579;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-top: 2px;
  }

  .chat-area {
    flex: 1; display: flex; flex-direction: column;
    background: #e7ebf0; height: 100%;
  }
  .chat-header {
    height: 56px; padding: 0 20px; background: #fff;
    border-bottom: 1px solid #e7ebf0;
    display: flex; align-items: center; gap: 12px;
  }
  .chat-header .name { font-weight: 500; }
  .chat-header .status { font-size: 13px; color: #707579; }

  .messages {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .message {
    max-width: 60%; padding: 8px 12px; border-radius: 12px;
    background: #fff; font-size: 14px; align-self: flex-start;
    box-shadow: 0 1px 1px rgba(0,0,0,.05);
  }
  .message.own {
    background: #d9f5fe; align-self: flex-end;
  }
  .message .time {
    font-size: 11px; color: #707579; margin-top: 4px; text-align: right;
  }

  .input-area {
    padding: 12px 20px; background: #fff;
    display: flex; gap: 10px; align-items: center;
  }
  .input-area input {
    flex: 1; padding: 10px 14px; border: 1px solid #e7ebf0;
    border-radius: 20px; background: #f4f6f8;
  }
  .input-area input:focus { background: #fff; border-color: #2AABEE; }
  .send-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: #2AABEE; color: #fff;
    display: flex; align-items: center; justify-content: center;
  }
  .send-btn:hover { background: #229ED9; }

  .empty-chat {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: #707579; font-size: 15px;
  }

  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.4); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #fff; width: 360px; padding: 24px;
    border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,.2);
  }
  .modal h2 { margin-bottom: 18px; font-size: 18px; }
  .modal .avatar-edit {
    width: 90px; height: 90px; margin: 0 auto 16px;
    border-radius: 50%; background: #2AABEE; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; cursor: pointer; position: relative;
    overflow: hidden; background-size: cover; background-position: center;
  }
  .modal .avatar-edit::after {
    content: ""; position: absolute; inset: 0;
    background: rgba(0,0,0,.4); color: #fff;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: .2s; font-size: 24px;
  }
  .modal .avatar-edit:hover::after { opacity: 1; }
  .modal input {
    width: 100%; padding: 10px 12px; border: 1px solid #ddd;
    border-radius: 8px; margin-bottom: 12px;
  }
  .modal .btn-row { display: flex; gap: 10px; margin-top: 8px; }
  .modal button {
    flex: 1; padding: 10px; border-radius: 8px; font-weight: 500;
  }
  .modal .btn-primary { background: #2AABEE; color: #fff; }
  .modal .btn-primary:hover { background: #229ED9; }
  .modal .btn-secondary { background: #f0f2f5; color: #333; }
  .modal .btn-secondary:hover { background: #e4e6eb; }
  .modal .btn-danger { background: #fff; color: #e53935; border: 1px solid #e53935; }
  .modal .btn-danger:hover { background: #fdecea; }
  
  .search-friends {
    padding: 12px 16px; border-bottom: 1px solid #e7ebf0;
  }
  .search-friends input {
    width: 100%; padding: 8px 12px; border: 1px solid #e7ebf0;
    border-radius: 8px; background: #f4f6f8;
  }
  .search-friends input:focus { border-color: #2AABEE; background: #fff; }

  @media (max-width: 768px) {
    .auth-screen { width: 90%; max-width: 360px; }
    
    .app.active { position: relative; }
    .sidebar { 
      position: absolute; width: 100%; height: 100%; z-index: 20; 
      transition: transform 0.3s ease;
    }
    .sidebar.hidden { transform: translateX(-100%); }
    
    .chat-area { 
      width: 100%; position: absolute; inset: 0; z-index: 10; 
      background: #e7ebf0;
    }
    body.dark .chat-area { background: #0f1419; }
    
    .mobile-back-btn { display: flex !important; }
    .message { max-width: 80%; }
  }
  
  .mobile-back-btn { display: none; }
</style>
</head>
<body>

<div class="auth-screen" id="authScreen">
  <h1 id="authTitle">Вход</h1>
  <div class="auth-error" id="authError"></div>

  <input type="text" id="authUsername" placeholder="Логин">
  <input type="text" id="authName" placeholder="Ваше имя" style="display:none">
  <input type="password" id="authPass" placeholder="Пароль">

  <button class="primary" id="authBtn">Войти</button>

  <div class="switch">
    <span id="switchText">Нет аккаунта?</span>
    <a id="switchLink">Зарегистрироваться</a>
  </div>
</div>

<div class="app" id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="icon-btn" id="settingsBtn" title="Настройки">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94 0 .31.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
        </svg>
      </button>
      <h3 style="font-size:16px;">Чаты</h3>
      <button class="icon-btn" id="profileBtn" title="Профиль">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
      </button>
    </div>
    
    <div class="search-friends">
      <input type="text" id="searchFriendInput" placeholder="Найти друга по логину...">
    </div>
    
    <div class="chat-list" id="chatList"></div>
  </aside>

  <main class="chat-area" id="chatArea">
    <div class="empty-chat" id="emptyChat">Выберите чат</div>
  </main>
</div>

<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h2>Настройки</h2>
    <p style="color:#666; margin-bottom:16px;">Текущий аккаунт: <b id="settingsUsername"></b></p>
    <div class="btn-row" style="margin-bottom:12px;">
  <button class="btn-secondary" id="themeToggle">Темная тема</button>
  <button class="btn-primary" id="adminPanelBtn" style="display:none !important;">Админ-панель</button>
</div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="closeModal('settingsModal')">Закрыть</button>
      <button class="btn-danger" id="logoutBtn">Выйти</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="profileModal">
  <div class="modal">
    <h2>Профиль</h2>
    <label class="avatar-edit" id="avatarEdit" for="avatarInput">?</label>
    <input type="file" id="avatarInput" accept="image/*" style="display:none">
    <input type="text" id="profileName" placeholder="Ваше имя">
    <div class="btn-row">
      <button class="btn-secondary" onclick="closeModal('profileModal')">Отмена</button>
      <button class="btn-primary" id="saveProfileBtn">Сохранить</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="adminModal">
  <div class="modal" style="width: 400px;">
    <h2>Админ-панель</h2>
    <p style="color:#888; margin-bottom:16px; font-size:14px;">Заявки на регистрацию:</p>
    <div id="pendingList" style="max-height: 300px; overflow-y: auto;"></div>
    <div class="btn-row" style="margin-top: 16px;">
      <button class="btn-secondary" onclick="closeModal('adminModal'); openModal('settingsModal')">Назад</button>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://mini-messenger-qil3.onrender.com';
let socket = null;

let state = {
  mode: 'login',
  currentUser: null,
  activeChatId: null,
  chats: [],
  darkTheme: localStorage.getItem('darkTheme') === 'true',
  pendingUsers: []
};

const $ = id => document.getElementById(id);
const openModal = id => $(id).classList.add('active');
const closeModal = id => $(id).classList.remove('active');

function getChatId(id1, id2) {
  if (id1 === id2) return `${id1}_${id1}`;
  return [id1, id2].sort().join('_');
}

function applyTheme() {
  if (state.darkTheme) {
    document.body.classList.add('dark');
    $('themeToggle').textContent = 'Светлая тема';
  } else {
    document.body.classList.remove('dark');
    $('themeToggle').textContent = 'Темная тема';
  }
}

function initSocket() {
  if (socket) socket.disconnect();
  socket = io(API_URL, { auth: { token: localStorage.getItem('token') } });
  socket.on('connect', () => console.log('Socket подключен:', socket.id));
  
  // Подключаемся к комнате текущего пользователя для получения уведомлений о новых чатах
  socket.on('connect', () => {
  socket.emit('joinUserRoom', state.currentUser.id);
  // Отправляем событие, что пользователь онлайн
  socket.emit('userOnline', state.currentUser.id);
});
  
  socket.on('newMessage', (message) => {
  console.log('📩 Получено сообщение:', message);
  
  let chat = state.chats.find(c => c.chatId === message.chatId);
  
  // Если чата нет - создаем новый
  if (!chat) {
    console.log('🆕 Создаем новый чат:', message.chatId);
    
    // Определяем имя партнера
    const isOwn = message.senderId._id === state.currentUser.id;
    const partnerName = isOwn 
      ? (message.receiverId?.name || message.receiverId?.username || 'Неизвестный')
      : (message.senderId.name || message.senderId.username || 'Неизвестный');
    const partnerAvatar = isOwn ? message.receiverId?.avatar : message.senderId.avatar;
    const partnerId = isOwn ? message.receiverId?._id || message.partnerId : message.senderId._id;
    
    chat = {
      chatId: message.chatId,
      name: partnerName,
      username: message.senderId.username,
      avatar: partnerAvatar || partnerName[0]?.toUpperCase() || '?',
      messages: [],
      partnerId: partnerId,
      lastMessage: message.text,
      lastTime: new Date(message.createdAt).toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit'})
    };
    
    state.chats.unshift(chat);
    renderChatList();
  }
  
  // Проверка на дубли
  const exists = chat.messages.some(m => {
    if (m._id && message._id && m._id.toString() === message._id.toString()) {
      return true;
    }
    if (m.text === message.text && 
        m.senderId === message.senderId._id &&
        Math.abs(new Date(m.createdAt || m.time) - new Date(message.createdAt)) < 3000) {
      return true;
    }
    return false;
  });
  
  if (exists) {
    console.log('⏭️ Сообщение уже есть, пропускаем');
    return;
  }
  
  const isOwn = message.senderId._id === state.currentUser.id;
  const time = new Date(message.createdAt).toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit'});
  
  chat.messages.push({ 
    text: message.text, 
    own: isOwn, 
    time, 
    _id: message._id,
    createdAt: message.createdAt,
    senderId: message.senderId._id
  });
  
  chat.lastMessage = message.text;
  chat.lastTime = time;
  
  // Сортируем чаты
  state.chats.sort((a, b) => {
    if (!a.lastTime) return 1;
    if (!b.lastTime) return -1;
    return new Date(b.lastTime) - new Date(a.lastTime);
  });
  
  // Если чат активен - обновляем сообщения
  if (state.activeChatId === chat.chatId) {
    renderMessages();
  }
  
  renderChatList();
});

// Добавить ПОСЛЕ этого (после строки ~320):
socket.on('messageSent', ({ _id, chatId, tempId }) => {
  console.log('✅ Сообщение доставлено:', _id);
  const chat = state.chats.find(c => c.chatId === chatId);
  if (!chat) return;
  
  // Заменяем временный ID на реальный
  if (tempId) {
    const msgIndex = chat.messages.findIndex(m => m._id === tempId);
    if (msgIndex !== -1) {
      chat.messages[msgIndex]._id = _id;
      renderMessages();
    }
  }
});
// --- СТАТУС ПОЛЬЗОВАТЕЛЯ ---
socket.on('userStatus', ({ userId, status }) => {
  console.log(`📡 Статус пользователя ${userId}: ${status}`);
  
  // Обновляем статус в активном чате
  const statusEl = document.querySelector('.chat-header .status');
  if (statusEl && state.activeChatId) {
    const chat = state.chats.find(c => c.chatId === state.activeChatId);
    if (chat && chat.partnerId === userId) {
      statusEl.textContent = status === 'online' ? 'В сети' : 'Был(а) недавно';
    }
  }
});

  // --- ИНДИКАТОР ПЕЧАТАНИЯ (БЕЗ ИМЕНИ) ---
socket.on('userTyping', ({ chatId }) => {
  if (state.activeChatId === chatId) {
    const statusEl = document.querySelector('.chat-header .status');
    if (statusEl) {
      statusEl.textContent = 'Печатает...';
      clearTimeout(window.typingTimeout);
      window.typingTimeout = setTimeout(() => {
        const chat = state.chats.find(c => c.chatId === state.activeChatId);
        if (chat && statusEl) {
          statusEl.textContent = 'В сети';
        }
      }, 2000);
    }
  }
});

  // Автоматическое добавление нового чата
  socket.on('newChat', (chatData) => {
    const exists = state.chats.find(c => c.chatId === chatData.chatId);
    if (!exists) {
      state.chats.unshift({
        chatId: chatData.chatId,
        name: chatData.name,
        username: chatData.username,
        avatar: chatData.avatar,
        messages: [],
        partnerId: chatData.partnerId,
        lastMessage: chatData.lastMessage,
        lastTime: chatData.lastTime
      });
      renderChatList();
    }
  });
}

function switchAuthMode() {
  state.mode = state.mode === 'login' ? 'register' : 'login';
  $('authTitle').textContent = state.mode === 'login' ? 'Вход' : 'Регистрация';
  $('authName').style.display = state.mode === 'register' ? 'block' : 'none';
  $('authBtn').textContent = state.mode === 'login' ? 'Войти' : 'Отправить заявку';
  $('switchText').textContent = state.mode === 'login' ? 'Нет аккаунта?' : 'Уже есть аккаунт?';
  $('switchLink').textContent = state.mode === 'login' ? 'Зарегистрироваться' : 'Войти';
  $('authError').textContent = '';
}
$('switchLink').onclick = switchAuthMode;

$('authBtn').onclick = async () => {
  const username = $('authUsername').value.trim();
  const pass = $('authPass').value;
  const name = $('authName').value.trim();
  const err = $('authError');
  
  if (!username || !pass) return err.textContent = 'Заполните все поля';
  if (state.mode === 'register' && !name) return err.textContent = 'Введите имя';

  err.textContent = 'Загрузка...';
  const endpoint = state.mode === 'register' ? '/register' : '/login';

  try {
    const res = await fetch(`${API_URL}/api/auth${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state.mode === 'register' ? { username, name, password: pass } : { username, password: pass })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Ошибка');
    
    if (state.mode === 'register') {
      err.textContent = '';
      alert('Заявка отправлена! Администратор подтвердит ваш аккаунт.');
      switchAuthMode();
    } else {
      localStorage.setItem('token', data.token);
      state.currentUser = data.user;
      err.textContent = '';
      showApp();
    }
  } catch (e) {
    err.textContent = e.message;
  }
};

$('logoutBtn').onclick = () => {
  localStorage.removeItem('token');
  state.currentUser = null;
  if (socket) socket.disconnect();
  closeModal('settingsModal');
  $('app').classList.remove('active');
  $('authScreen').style.display = 'block';
  $('authUsername').value = '';
  $('authPass').value = '';
};

$('profileBtn').onclick = () => {
  $('profileName').value = state.currentUser.name;
  updateAvatarPreview(state.currentUser.avatar);
  openModal('profileModal');
};

$('avatarInput').onchange = e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    state.currentUser.avatar = ev.target.result;
    updateAvatarPreview(ev.target.result);
  };
  reader.readAsDataURL(file);
};

function updateAvatarPreview(src) {
  const el = $('avatarEdit');
  if (src) { el.style.backgroundImage = `url(${src})`; el.textContent = ''; } 
  else { el.style.backgroundImage = ''; el.textContent = (state.currentUser?.name || '?')[0].toUpperCase(); }
}

$('saveProfileBtn').onclick = () => {
  state.currentUser.name = $('profileName').value.trim() || state.currentUser.name;
  closeModal('profileModal');
  renderChatList();
};

$('settingsBtn').onclick = () => {
  $('settingsUsername').textContent = state.currentUser.username;
  
  const adminBtn = $('adminPanelBtn');
  
  // ТОЛЬКО ПО ФЛАГУ isAdmin
  if (state.currentUser.isAdmin === true) {
    adminBtn.style.display = 'block';
    adminBtn.style.visibility = 'visible';
    console.log('✅ Админ-панель доступна');
  } else {
    adminBtn.style.display = 'none';
    console.log('❌ Обычный пользователь');
  }
  
  openModal('settingsModal');
};

$('themeToggle').onclick = () => {
  state.darkTheme = !state.darkTheme;
  localStorage.setItem('darkTheme', state.darkTheme);
  applyTheme();
};

$('adminPanelBtn').onclick = async () => {
  closeModal('settingsModal');
  openModal('adminModal');
  $('pendingList').innerHTML = '<p style="text-align:center;color:#888;">Загрузка...</p>';
  
  try {
    const res = await fetch(`${API_URL}/api/admin/pending`, {
      headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
    });
    if (!res.ok) throw new Error('Ошибка загрузки');
    state.pendingUsers = await res.json();
    renderPendingUsers();
  } catch (e) {
    $('pendingList').innerHTML = `<p style="color:red;text-align:center;">${e.message}</p>`;
  }
};

function renderPendingUsers() {
  const list = $('pendingList');
  if (state.pendingUsers.length === 0) {
    list.innerHTML = '<p style="text-align:center;color:#888;">Нет новых заявок</p>';
    return;
  }
  list.innerHTML = state.pendingUsers.map(u => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px;border-bottom:1px solid #eee;">
      <div>
        <div style="font-weight:bold;">${u.username}</div>
        <div style="font-size:12px;color:#888;">${u.name}</div>
      </div>
      <button class="btn-primary" style="padding:6px 12px;font-size:13px;" onclick="approveUser('${u.username}')">Одобрить</button>
    </div>
  `).join('');
}

async function approveUser(username) {
  try {
    const res = await fetch(`${API_URL}/api/admin/approve`, {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${localStorage.getItem('token')}` 
      },
      body: JSON.stringify({ username })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    alert(data.msg);
    state.pendingUsers = state.pendingUsers.filter(u => u.username !== username);
    renderPendingUsers();
  } catch (e) {
    alert(e.message);
  }
}

$('searchFriendInput').onkeydown = async (e) => {
  if (e.key !== 'Enter') return;
  const username = e.target.value.trim();
  if (!username) return;

  try {
    const res = await fetch(`${API_URL}/api/users/search?username=${encodeURIComponent(username)}`, {
      headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
    });
    
    if (!res.ok) {
      const data = await res.json();
      alert(data.error || 'Пользователь не найден');
      e.target.value = '';
      return;
    }

    const user = await res.json();
    if (user._id === state.currentUser.id) {
      alert('Это вы сами!');
      e.target.value = '';
      return;
    }

    const chatId = getChatId(state.currentUser.id, user._id);
    let chat = state.chats.find(c => c.chatId === chatId);
    if (!chat) {
      chat = {
        chatId: chatId,
        name: user.name,
        username: user.username,
        avatar: user.avatar || (user.username ? user.username[0].toUpperCase() : '?'),
        messages: [],
        partnerId: user._id
      };
      state.chats.push(chat);
    }
    
    state.activeChatId = chat.chatId;
    renderChatList();
    renderChat();
    e.target.value = '';
    
    if (window.innerWidth <= 768) {
      $('sidebar').classList.add('hidden');
    }
  } catch (err) {
    alert('Ошибка поиска. Проверьте интернет.');
  }
};

async function loadChats() {
  try {
    const res = await fetch(`${API_URL}/api/chats`, {
      headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
    });
    if (res.ok) {
      const chats = await res.json();
      
      // Сохраняем избранное
      const favorite = state.chats.find(c => c.isFavorite);
      state.chats = [];
      if (favorite) state.chats.push(favorite);
      
      chats.forEach(c => {
        if (!state.chats.find(existing => existing.chatId === c.chatId)) {
          state.chats.push({
            chatId: c.chatId,
            name: c.name,
            username: c.username,
            avatar: c.avatar,
            messages: [],
            partnerId: c.partnerId,
            lastMessage: c.lastMessage,
            lastTime: c.lastTime
          });
        }
      });
    }
  } catch (e) {
    console.error('Ошибка загрузки чатов:', e);
  }
}

function renderChatList() {
  const list = $('chatList');
  list.innerHTML = '';
  state.chats.forEach(c => {
    const div = document.createElement('div');
    div.className = 'chat-item' + (c.chatId === state.activeChatId ? ' active' : '');
    div.innerHTML = `
      <div class="avatar" style="${c.avatar && c.avatar.length > 1 ? `background-image:url(${c.avatar})` : ''}">${c.avatar && c.avatar.length <= 1 ? c.avatar : ''}</div>
      <div class="chat-info">
        <div class="chat-top">
          <span class="chat-name">${c.name}</span>
          <span class="chat-time">${c.lastTime || ''}</span>
        </div>
        <div class="chat-preview">${c.lastMessage || 'Нет сообщений'}</div>
      </div>`;
    div.onclick = () => { 
      state.activeChatId = c.chatId; 
      renderChatList(); 
      renderChat(); 
      if (window.innerWidth <= 768) $('sidebar').classList.add('hidden');
    };
    list.appendChild(div);
  });
}

function closeChatMobile() {
  state.activeChatId = null;
  $('sidebar').classList.remove('hidden');
  renderChatList();
  $('chatArea').innerHTML = '<div class="empty-chat">Выберите чат</div>';
}

async function renderChat() {
  const area = $('chatArea');
  const chat = state.chats.find(c => c.chatId === state.activeChatId);
  if (!chat) return;

  area.innerHTML = `
    <div class="chat-header">
      <button class="icon-btn mobile-back-btn" onclick="closeChatMobile()" style="margin-right: 8px;">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <div class="avatar" style="${chat.avatar && chat.avatar.length > 1 ? `background-image:url(${chat.avatar})` : ''}">${chat.avatar && chat.avatar.length <= 1 ? chat.avatar : ''}</div>
      <div>
        <div class="name">${chat.name}</div>
        <div class="status" id="chatStatus">Загрузка...</div>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input type="text" id="msgInput" placeholder="Сообщение...">
      <button class="send-btn" id="sendBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>`;
    // Получаем статус собеседника
  const statusEl = document.querySelector('#chatStatus');
  if (statusEl && chat.partnerId) {
    fetch(`${API_URL}/api/users/status/${chat.partnerId}`, {
      headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
    })
    .then(res => res.json())
    .then(data => {
      statusEl.textContent = data.isOnline ? '🟢 в сети' : '⚪ был(а) недавно';
    })
    .catch(() => {
      statusEl.textContent = 'в сети';
    });
  }

  chat.messages = []; 
  renderMessages();

  try {
    const res = await fetch(`${API_URL}/api/messages/${chat.chatId}`, {
      headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
    });
    if (res.ok) {
      const messages = await res.json();
      chat.messages = messages.map(m => ({
        text: m.text,
        own: m.senderId._id === state.currentUser.id,
        time: new Date(m.createdAt).toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit'}),
        _id: m._id
      }));
      renderMessages();
    }
  } catch (e) { console.error(e); }

  if (socket) socket.emit('joinChat', chat.chatId);

  const input = $('msgInput');
  input.focus();
  input.onkeydown = e => { if (e.key === 'Enter') sendMessage(); };
    // Обработка ввода (для печатания, опционально)
  input.oninput = () => {
  if (input.value.trim()) {
    socket.emit('typing', { chatId: chat.chatId });
  }
};  
  $('sendBtn').onclick = sendMessage;
}

function renderMessages() {
  const chat = state.chats.find(c => c.chatId === state.activeChatId);
  const box = $('messages');
  if (!box || !chat) return;
  
  // Очищаем дубликаты
  const uniqueMessages = [];
  const seenIds = new Set();
  chat.messages.forEach(m => {
    const id = m._id ? m._id.toString() : null;
    if (id && !seenIds.has(id)) {
      seenIds.add(id);
      uniqueMessages.push(m);
    } else if (!id) {
      uniqueMessages.push(m);
    }
  });
  chat.messages = uniqueMessages;
  
  // Рендерим сообщения
  box.innerHTML = '';
  chat.messages.forEach(m => {
    const div = document.createElement('div');
    div.className = 'message' + (m.own ? ' own' : '');
    div.innerHTML = `<div>${m.text}</div><div class="time">${m.time}</div>`;
    box.appendChild(div);
  });
  box.scrollTop = box.scrollHeight;
}

function sendMessage() {
  const input = $('msgInput');
  const text = input.value.trim();
  if (!text || !state.activeChatId) return;

  const chat = state.chats.find(c => c.chatId === state.activeChatId);
  const time = new Date().toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit'});
  
  // Генерируем временный ID
  const tempId = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
  
  // Оптимистично добавляем сообщение
  chat.messages.push({ 
    text, 
    own: true, 
    time,
    _id: tempId,
    createdAt: new Date().toISOString(),
    senderId: state.currentUser.id
  });
  renderMessages();
  
  input.value = '';

  if (socket && socket.connected) {
    socket.emit('sendMessage', { 
      chatId: chat.chatId, 
      text, 
      senderId: state.currentUser.id,
      partnerId: chat.partnerId,
      tempId
    });
      // После socket.emit('sendMessage', ...) добавь:
      socket.emit('typing', { chatId: chat.chatId, username: '' });
  } else {
    // Fallback через REST API
    fetch(`${API_URL}/api/messages`, {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${localStorage.getItem('token')}` 
      },
      body: JSON.stringify({ 
        chatId: chat.chatId, 
        text, 
        partnerId: chat.partnerId 
      })
    }).then(res => res.json()).then(data => {
      const msgIndex = chat.messages.findIndex(m => m._id === tempId);
      if (msgIndex !== -1) {
        chat.messages[msgIndex]._id = data._id;
        renderMessages();
      }
    }).catch(err => {
      chat.messages = chat.messages.filter(m => m._id !== tempId);
      renderMessages();
      alert('Не удалось отправить сообщение');
    });
  }
}

async function showApp() {
  $('authScreen').style.display = 'none';
  $('app').classList.add('active');
  applyTheme();
  initSocket();
  
  // ПРОВЕРКА: существует ли уже Избранное
  const favChatId = getChatId(state.currentUser.id, state.currentUser.id);
  const existingFav = state.chats.find(c => c.isFavorite === true);
  
  if (!existingFav) {
    // Создаём только если нет
    const favChat = {
      chatId: favChatId,
      name: 'Избранное',
      username: state.currentUser.username || 'user',
      avatar: state.currentUser.avatar || (state.currentUser.username ? state.currentUser.username[0].toUpperCase() : '?'),
      messages: [],
      partnerId: state.currentUser.id,
      lastMessage: '',
      lastTime: '',
      isFavorite: true
    };
    state.chats.unshift(favChat);
  } else {
    // Если есть - обновляем аватарку
    existingFav.avatar = state.currentUser.avatar || (state.currentUser.username ? state.currentUser.username[0].toUpperCase() : '?');
  }
  
  await loadChats();
  renderChatList();
}

window.addEventListener('DOMContentLoaded', async () => {
  const token = localStorage.getItem('token');
  if (token) {
    try {
      const res = await fetch(`${API_URL}/api/profile`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) {
        const data = await res.json();
        state.currentUser = data.user;
        
        
        console.log('✅ Загружен пользователь:', state.currentUser);
        showApp();
      } else {
        localStorage.removeItem('token');
      }
    } catch(e) {
      console.error('Ошибка загрузки профиля:', e);
      localStorage.removeItem('token');
    }
  }
});

document.querySelectorAll('.modal-overlay').forEach(ov => {
  ov.addEventListener('click', e => { if (e.target === ov) ov.classList.remove('active'); });
});
</script>
